<!DOCTYPE html>
<html>
<head>
  <title>Area Calculator</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 10px;
    }
    .container {
      background: linear-gradient(145deg, #e0e0e0, #cfcfcf);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
      width: 100%;
      max-width: 350px;
    }

    h2 {
      color: #333;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      color: #555;
      display: block;
      text-align: left;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #aaa;
      border-radius: 8px;
      outline: none;
      font-size: 16px;
      transition: 0.3s;
      background-color: #fff;
    }

    input:focus {
      border-color: #757575;
      box-shadow: 0 0 8px rgba(117, 117, 117, 0.4);
    }

    button {
      background: #616161;
      color: white;
      padding: 10px 20px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
    }

    button:hover {
      background: #4d4d4d;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #333;
      background: #fff;
      padding: 8px;
      border-radius: 8px;
      box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
    }


    @media (max-width: 480px) {
      .container {
        padding: 20px;
      }

      h2 {
        font-size: 20px;
      }

      button {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Rectangle Area Calculator</h2>

    <label for="length">Length:</label>
    <input type="number" id="length" placeholder="Enter length">

    <label for="breadth">Breadth:</label>
    <input type="number" id="breadth" placeholder="Enter breadth">

    <button onclick="calculateArea()">Calculate Area</button>

    <p id="result"></p>
  </div>

  <script>
    function calculateArea() {
      let length = parseFloat(document.getElementById('length').value);
      let breadth = parseFloat(document.getElementById('breadth').value);

      if (!isNaN(length) && !isNaN(breadth) && length > 0 && breadth > 0) {
        let area = length * breadth;
        document.getElementById('result').textContent = "Area: " + area;
      } else {
        document.getElementById('result').textContent = "Please enter valid positive numbers.";
      }
    }
  </script>

</body>
</html>
